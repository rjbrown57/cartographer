syntax = "proto3";

option go_package = "github.com/rjbrown57/cartographer/pkg/proto";

package cartographer.v1;

import "google/protobuf/struct.proto";

// Note represents searchable markdown content with optional URL metadata.
message Note {
  string url = 1;
  string title = 2;
  string body = 3;
  repeated string tags = 4; // need to fix this to use repeated Tag tags
  google.protobuf.Struct data = 6;
  string id = 7;
  map<string, string> annotations = 8;
}

// Tag represents a label or category for organizing notes.
message Tag {
  string name = 1;
  string description = 2;
  map<string, string> annotations = 3;
}
