name: Go

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Go
      uses: actions/setup-go@v2
      with:
        go-version: 1.23

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...
      # https://github.com/marketplace/actions/gosec-security-checker
    - name: Gosec Security Checker
      uses: securego/gosec@v2.21.4
      with:
        args: ./...
  