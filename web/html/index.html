<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{.sitename}}</title>
	<link rel="icon" type="image/x-icon" href="/favicon.ico" />
	<link rel="apple-touch-icon" href="/favicon.ico" />
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<style>
		:root {
			color-scheme: light;
			--app-bg: #eef2f7;
			--nav-bg: #0f172a;
			--nav-accent: #38bdf8;
			--card-bg: #ffffff;
			--card-border: #cbd5e1;
			--text-primary: #0f172a;
			--text-muted: #475569;
			--tag-bg: #e2e8f0;
			--tag-text: #1e293b;
			--tag-hover: #cbd5f5;
			--accent: #6366f1;
			--accent-dark: #4f46e5;
		}

		body {
			font-family: 'Inter', system-ui, -apple-system, sans-serif;
			background: radial-gradient(circle at top, #f8fafc 0%, var(--app-bg) 45%, #dde7f5 100%);
			color: var(--text-primary);
			min-height: 100vh;
		}

		.top-nav {
			background: linear-gradient(120deg, #0f172a, #1e293b 40%, #0f172a 100%);
			box-shadow: 0 20px 40px rgba(15, 23, 42, 0.2);
		}

		.nav-meta {
			color: #e2e8f0;
			width: 100%;
			transition: opacity 0.24s ease, transform 0.24s ease;
		}

		.nav-meta--enter {
			opacity: 0;
			transform: translateY(6px);
		}

		.nav-meta--loading .nav-tag {
			pointer-events: none;
		}

		.nav-meta__content {
			padding-top: 0.4rem;
			display: flex;
			flex-wrap: wrap;
			align-items: center;
			gap: 0.45rem;
			row-gap: 0.35rem;
		}

		.nav-stat {
			display: inline-flex;
			align-items: center;
			gap: 0.5rem;
			background: rgba(148, 163, 184, 0.12);
			border: 1px solid rgba(148, 163, 184, 0.22);
			border-radius: 10px;
			padding: 0.35rem 0.65rem;
			color: #dce6f3;
			letter-spacing: 0.02em;
			text-transform: uppercase;
			font-size: 0.72rem;
		}

		.nav-stat__count {
			color: #f8fafc;
			font-size: 0.95rem;
			font-weight: 700;
		}

		.nav-tags {
			display: flex;
			flex-wrap: wrap;
			gap: 0.35rem;
			row-gap: 0.3rem;
			align-items: center;
			padding: 0.1rem 0;
			max-height: 64px;
			overflow: hidden;
			width: 100%;
		}

		.nav-tags--collapsed {
			max-height: 32px;
		}

		.nav-tags__toggle {
			background: rgba(15, 23, 42, 0.18);
			border: 1px solid rgba(148, 163, 184, 0.2);
			border-radius: 999px;
			color: rgba(226, 232, 240, 0.82);
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 1.45rem;
			height: 1.45rem;
			padding: 0;
			transition: background 0.15s ease, color 0.15s ease;
		}

		.nav-tags__toggle:hover {
			background: rgba(56, 189, 248, 0.18);
			color: #f8fafc;
		}

		.nav-tags__summary {
			color: rgba(226, 232, 240, 0.72);
			font-size: 0.72rem;
			font-weight: 600;
		}

		.nav-meta__label {
			text-transform: uppercase;
			font-size: 0.55rem;
			letter-spacing: 0.1em;
			color: rgba(226, 232, 240, 0.75);
			padding-right: 0.4rem;
		}

		.nav-meta__icon {
			color: rgba(226, 232, 240, 0.9);
			font-size: 0.85rem;
		}

		.nav-tag {
			background: rgba(15, 23, 42, 0.25);
			border: 1px solid rgba(148, 163, 184, 0.18);
			border-radius: 999px;
			color: #e2e8f0;
			display: inline-flex;
			align-items: center;
			gap: 0.32rem;
			padding: 0.22rem 0.52rem;
			font-weight: 600;
			font-size: 0.72rem;
			text-decoration: none;
			transition: transform 0.15s ease, background 0.15s ease;
		}

		.nav-tag:hover {
			background: rgba(56, 189, 248, 0.22);
			color: #f8fafc;
			transform: translateY(-1px);
		}

		.nav-tag--active {
			background: rgba(56, 189, 248, 0.38);
			border-color: rgba(56, 189, 248, 0.85);
			color: #f8fafc;
			box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.35);
		}

		.nav-tag__count {
			color: rgba(226, 232, 240, 0.75);
			font-size: 0.62rem;
		}

		.nav-tag__text {
			max-width: 8rem;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
		}

		.nav-tag--more {
			border-style: dashed;
			border-color: rgba(148, 163, 184, 0.4);
			background: rgba(15, 23, 42, 0.35);
			color: #f8fafc;
		}

		.nav-tag--more:hover {
			background: rgba(56, 189, 248, 0.22);
		}

		.nav-tag--skeleton {
			min-width: 68px;
			height: 28px;
			border-color: rgba(148, 163, 184, 0.18);
			background: linear-gradient(90deg, rgba(148, 163, 184, 0.2), rgba(226, 232, 240, 0.35), rgba(148, 163, 184, 0.2));
			background-size: 200% 100%;
			animation: shimmer 1.25s ease-in-out infinite;
		}

		.namespace-tabs {
			align-items: flex-end;
			gap: 0;
			max-height: none;
			margin-top: 0.1rem;
			padding: 0.2rem 0 0;
			overflow-x: auto;
			overflow-y: hidden;
			scrollbar-width: thin;
			border-bottom: 1px solid rgba(148, 163, 184, 0.26);
		}

		.namespace-tab {
			background: transparent;
			border: 1px solid transparent;
			border-bottom: 0;
			border-radius: 8px 8px 0 0;
			color: rgba(226, 232, 240, 0.78);
			display: inline-flex;
			align-items: center;
			margin-bottom: -1px;
			min-height: 2.25rem;
			padding: 0.45rem 0.95rem;
			font-size: 0.78rem;
			font-weight: 700;
			white-space: nowrap;
			transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
		}

		.namespace-tab:disabled {
			cursor: wait;
		}

		.namespace-tab + .namespace-tab {
			margin-left: -1px;
		}

		.namespace-tab:hover {
			background: rgba(15, 23, 42, 0.18);
			color: #f8fafc;
			border-color: rgba(148, 163, 184, 0.2);
		}

		.namespace-tab[aria-selected="true"] {
			background: var(--app-bg);
			border-color: rgba(148, 163, 184, 0.34);
			border-bottom-color: var(--app-bg);
			box-shadow: inset 0 3px 0 var(--nav-accent);
			color: var(--text-primary);
		}

		.namespace-tab--loading::after {
			content: "";
			width: 0.45rem;
			height: 0.45rem;
			margin-left: 0.45rem;
			border: 2px solid rgba(15, 23, 42, 0.18);
			border-top-color: var(--accent);
			border-radius: 999px;
			animation: spin 0.7s linear infinite;
		}

		.namespace-tab--utility {
			justify-content: center;
			min-width: 2.45rem;
			padding-inline: 0.65rem;
		}

		.namespace-tab--utility i {
			font-size: 0.95rem;
			line-height: 1;
		}

		.namespace-tab__text {
			max-width: 12rem;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.namespace-finder {
			width: min(460px, 100%);
			margin-top: 0.55rem;
			padding: 0.6rem;
			border: 1px solid rgba(148, 163, 184, 0.24);
			border-radius: 8px;
			background: rgba(15, 23, 42, 0.94);
			box-shadow: 0 16px 36px rgba(15, 23, 42, 0.25);
			display: grid;
			gap: 0.45rem;
		}

		.namespace-finder__bar {
			display: flex;
			align-items: center;
			gap: 0.4rem;
		}

		.namespace-finder__input {
			width: 100%;
			min-height: 2.15rem;
			border: 1px solid rgba(148, 163, 184, 0.32);
			border-radius: 6px;
			background: rgba(248, 250, 252, 0.08);
			color: #f8fafc;
			font-size: 0.84rem;
			outline: none;
			padding: 0.45rem 0.65rem;
		}

		.namespace-finder__input:focus {
			border-color: rgba(56, 189, 248, 0.8);
			box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.16);
		}

		.namespace-finder__close {
			width: 2.15rem;
			height: 2.15rem;
			border: 1px solid rgba(148, 163, 184, 0.28);
			border-radius: 6px;
			background: rgba(248, 250, 252, 0.06);
			color: rgba(226, 232, 240, 0.82);
		}

		.namespace-finder__close:hover {
			background: rgba(248, 250, 252, 0.12);
			color: #f8fafc;
		}

		.namespace-finder__list {
			display: grid;
			gap: 0.25rem;
			max-height: 15rem;
			overflow: auto;
			padding-right: 0.15rem;
		}

		.namespace-finder__item {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 0.75rem;
			width: 100%;
			border: 1px solid transparent;
			border-radius: 6px;
			background: transparent;
			color: rgba(226, 232, 240, 0.9);
			font-size: 0.84rem;
			font-weight: 700;
			padding: 0.45rem 0.55rem;
			text-align: left;
		}

		.namespace-finder__item:hover,
		.namespace-finder__item:focus {
			border-color: rgba(56, 189, 248, 0.36);
			background: rgba(56, 189, 248, 0.14);
			color: #f8fafc;
			outline: none;
		}

		.namespace-finder__item small {
			color: rgba(148, 163, 184, 0.88);
			font-size: 0.72rem;
			font-weight: 700;
		}

		.namespace-finder__item--create {
			color: #bae6fd;
		}

		.namespace-finder__empty {
			margin: 0;
			color: rgba(226, 232, 240, 0.72);
			font-size: 0.78rem;
			line-height: 1.35;
			padding: 0.25rem 0.1rem;
		}

		@keyframes shimmer {
			from {
				background-position: 200% 0;
			}
			to {
				background-position: -200% 0;
			}
		}

		@keyframes spin {
			to {
				transform: rotate(360deg);
			}
		}

		.brand {
			font-family: 'Space Grotesk', sans-serif;
			font-weight: 600;
			letter-spacing: 0.02em;
			color: #f8fafc;
		}

		.brand:hover,
		.brand:focus {
			color: #f8fafc;
			text-decoration: none;
		}

		.brand i {
			color: var(--nav-accent);
			font-size: 1.4rem;
		}

		.nav-divider {
			width: 1px;
			height: 32px;
			background: rgba(148, 163, 184, 0.4);
		}

		.search-bar-wrap {
			background: rgba(15, 23, 42, 0.4);
			border-radius: 999px;
			border: 1px solid rgba(148, 163, 184, 0.35);
			overflow: hidden;
		}

		.search-bar-wrap .search-icon-wrap {
			background: transparent;
			border: none;
			color: rgba(226, 232, 240, 0.85);
		}

		.search-input {
			background: transparent;
			border: none;
			color: #f8fafc;
			caret-color: #f8fafc;
			padding-left: 0;
		}

		.search-input::placeholder {
			color: rgba(226, 232, 240, 0.6);
		}

		.search-input:focus {
			box-shadow: none;
			color: #f8fafc;
			background: transparent;
		}

		.search-input:-webkit-autofill,
		.search-input:-webkit-autofill:hover,
		.search-input:-webkit-autofill:focus {
			-webkit-text-fill-color: #f8fafc;
			box-shadow: 0 0 0px 1000px rgba(15, 23, 42, 0.4) inset;
			transition: background-color 9999s ease-in-out 0s;
		}

		.nav-action {
			border-radius: 999px;
			border: 1px solid rgba(148, 163, 184, 0.4);
			color: #e2e8f0;
			font-weight: 500;
			gap: 0.5rem;
		}

		.nav-action:hover,
		.nav-action:focus {
			background: rgba(148, 163, 184, 0.2);
			color: #f8fafc;
		}

		.nav-action--active {
			background: rgba(56, 189, 248, 0.22);
			border-color: rgba(56, 189, 248, 0.7);
			color: #f8fafc;
		}

		.nav-action i {
			font-size: 1rem;
		}

		.nav-icon {
			border-radius: 999px;
			width: 40px;
			height: 40px;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			background: rgba(56, 189, 248, 0.15);
			color: #f8fafc;
			border: 1px solid rgba(56, 189, 248, 0.35);
		}

		.nav-icon:hover {
			background: rgba(56, 189, 248, 0.3);
			color: #f8fafc;
		}

		.custom-dropdown {
			position: absolute;
			top: 110%;
			left: 0;
			background: #1e293b;
			border-radius: 16px;
			padding: 0.5rem;
			min-width: 220px;
			box-shadow: 0 20px 40px rgba(15, 23, 42, 0.4);
			border: 1px solid rgba(148, 163, 184, 0.25);
			z-index: 1000;
		}

		.dropdown-list {
			max-height: 200px;
			overflow-y: auto;
		}

		.dropdown-item-link {
			display: block;
			padding: 0.55rem 0.75rem;
			border-radius: 12px;
			color: #e2e8f0;
			text-decoration: none;
			font-size: 0.9rem;
		}

		.dropdown-item-link:hover {
			background: rgba(148, 163, 184, 0.2);
			color: #f8fafc;
		}

		.app-container {
			max-width: 1680px;
			padding: 1.35rem clamp(0.75rem, 2vw, 1.25rem) 4rem;
			animation: contentEnter 0.18s ease-out;
			transition: opacity 0.16s ease, transform 0.16s ease;
		}

		body.namespace-switching .app-container {
			opacity: 0.45;
			transform: translateY(6px);
			pointer-events: none;
		}

		@keyframes contentEnter {
			from {
				opacity: 0.65;
				transform: translateY(5px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@media (prefers-reduced-motion: reduce) {
			.app-container,
			body.namespace-switching .app-container,
			.namespace-tab--loading::after {
				animation: none;
				transition: none;
				transform: none;
			}
		}

		#linkgrid {
			display: grid;
			gap: 1rem;
			grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
			grid-auto-rows: minmax(14.5rem, auto);
		}

		.link-card {
			background: var(--card-bg);
			border: 1px solid var(--card-border);
			border-radius: 12px;
			padding: 1rem;
			position: relative;
			display: flex;
			flex-direction: column;
			gap: 0.75rem;
			height: 100%;
			min-height: 14.5rem;
			box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
			transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
			will-change: transform;
			backface-visibility: hidden;
			transform: translateZ(0);
			cursor: pointer;
			overflow: hidden;
		}

		.link-card::before {
			content: "";
			position: absolute;
			inset: 0 auto 0 0;
			width: 4px;
			background: var(--card-rail, var(--accent));
		}

		.note-card--link {
			--card-rail: #0ea5e9;
		}

		.note-card--text {
			--card-rail: #6366f1;
		}

		.note-card--data {
			--card-rail: #059669;
		}

		.link-card:hover {
			border-color: #94a3b8;
			transform: translate3d(0, -2px, 0);
			box-shadow: 0 14px 28px rgba(15, 23, 42, 0.11);
		}

		.card-view {
			display: flex;
			flex-direction: column;
			gap: 0.65rem;
			flex: 1 1 auto;
			min-height: 0;
			padding-right: 0;
		}

		.note-card__content {
			min-height: 0;
		}

		.note-meta-row {
			display: flex;
			align-items: center;
			flex-wrap: wrap;
			gap: 0.4rem;
			min-height: 1.5rem;
		}

		.note-type-badge,
		.note-meta-chip {
			display: inline-flex;
			align-items: center;
			gap: 0.3rem;
			border-radius: 999px;
			font-size: 0.68rem;
			font-weight: 700;
			line-height: 1;
			padding: 0.3rem 0.5rem;
		}

		.note-type-badge {
			background: color-mix(in srgb, var(--card-rail) 12%, white);
			color: color-mix(in srgb, var(--card-rail) 72%, #0f172a);
		}

		.note-meta-chip {
			background: #f1f5f9;
			color: #64748b;
		}

		.link-title {
			font-weight: 600;
			font-size: 1rem;
			line-height: 1.35;
			color: var(--text-primary);
			text-decoration: none;
			display: -webkit-box;
			-webkit-line-clamp: 2;
			-webkit-box-orient: vertical;
			overflow: hidden;
			text-overflow: ellipsis;
			word-break: break-word;
		}

		.link-title:hover {
			color: var(--accent-dark);
			text-decoration: underline;
		}

		.note-card a,
		.note-card button,
		.note-card input,
		.note-card textarea,
		.note-card select {
			cursor: pointer;
		}

		.link-description {
			color: var(--text-muted);
			font-size: 0.9rem;
			margin: 0;
		}

		.note-title {
			background: transparent;
			border: 0;
			padding: 0;
			text-align: left;
		}

		.note-actions {
			position: absolute;
			top: 0.85rem;
			right: 0.85rem;
			z-index: 2;
			display: none;
			align-items: center;
			gap: 0.35rem;
			background: rgba(248, 250, 252, 0.88);
			border: 1px solid rgba(203, 213, 225, 0.75);
			border-radius: 999px;
			box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
			padding: 0.2rem;
			backdrop-filter: blur(6px);
		}

		#maximized-card-overlay .note-actions {
			display: flex;
		}

		.note-action-button {
			border: 0;
			border-radius: 999px;
			background: transparent;
			color: #475569;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			gap: 0.35rem;
			font-size: 0.9rem;
			height: 1.9rem;
			width: 1.9rem;
			padding: 0;
			transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
		}

		.note-action-button:hover {
			background: #eef2ff;
			color: var(--accent-dark);
		}

		.note-action-button--danger:hover {
			background: #fee2e2;
			color: #b91c1c;
		}

		.note-action-button--success,
		.note-action-button--success:hover {
			background: #ecfdf5;
			color: #15803d;
		}

		.admin-only {
			display: none !important;
		}

		body.is-admin .admin-only {
			display: inline-flex !important;
		}

		.note-markdown {
			line-height: 1.48;
		}

		.note-markdown h1,
		.note-markdown h2,
		.note-markdown h3,
		.note-markdown h4,
		.note-markdown h5,
		.note-markdown h6 {
			color: var(--text-primary);
			font-family: 'Inter', system-ui, -apple-system, sans-serif;
			font-weight: 700;
			line-height: 1.28;
			margin: 0.85rem 0 0.4rem;
		}

		.note-markdown h1 {
			font-size: 1.35rem;
		}

		.note-markdown h2 {
			font-size: 1.16rem;
		}

		.note-markdown h3,
		.note-markdown h4,
		.note-markdown h5,
		.note-markdown h6 {
			font-size: 1rem;
		}

		.note-markdown > :first-child {
			margin-top: 0;
		}

		.note-markdown > :last-child {
			margin-bottom: 0;
		}

		.note-markdown--preview {
			max-height: 5.25rem;
			overflow: hidden;
			position: relative;
		}

		.note-markdown--preview h1,
		.note-markdown--preview h2,
		.note-markdown--preview h3,
		.note-markdown--preview h4,
		.note-markdown--preview h5,
		.note-markdown--preview h6 {
			font-size: 0.92rem;

						</div>
						<div class="col-12">
							<details id="noteDataDetails" class="note-data-details">
								<summary class="note-data-summary">Structured data</summary>
								<textarea id="noteData" class="form-control note-data-textarea" rows="6" autocomplete="off" spellcheck="false" placeholder='{"key": "value"}'></textarea>
							</details>
						</div>
						<div class="col-12 col-lg-4 d-flex align-items-end gap-3">
							<button class="btn btn-primary d-inline-flex align-items-center gap-2" type="submit">
								<i class="bi bi-save"></i>
								<span id="noteSubmitLabel">Save note</span>
							</button>
							<span id="noteFormStatus" class="note-form-status"></span>
						</div>
					</div>
				</form>
			</div>
		</section>
		<div id="link" class="links">
			<div id="linkgrid"></div>
		</div>
	</main>
</body>
</html>
