<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{ .sitename }} Note</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
	<style>
		:root {
			--bg: #f8fafc;
			--panel: #ffffff;
			--border: #cbd5e1;
			--text: #172033;
			--muted: #64748b;
			--accent: #3152d4;
		}

		body {
			background: var(--bg);
			color: var(--text);
			font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			margin: 0;
			min-height: 100vh;
		}

		.note-page {
			margin: 0 auto;
			max-width: 900px;
			padding: 2rem 1rem 4rem;
		}

		.note-nav {
			align-items: center;
			display: flex;
			justify-content: space-between;
			gap: 1rem;
			margin-bottom: 1rem;
		}

		.note-nav a {
			color: var(--accent);
			font-weight: 700;
			text-decoration: none;
		}

		.note-shell {
			background: var(--panel);
			border: 1px solid var(--border);
			border-radius: 12px;
			box-shadow: 0 22px 60px rgba(15, 23, 42, 0.08);
			padding: clamp(1rem, 3vw, 2rem);
		}

		.note-actions {
			align-items: center;
			display: flex;
			flex-wrap: wrap;
			gap: 0.5rem;
			justify-content: flex-end;
			margin-bottom: 1rem;
		}

		.note-action {
			align-items: center;
			background: #ffffff;
			border: 1px solid var(--border);
			border-radius: 999px;
			color: #475569;
			display: inline-flex;
			font-weight: 700;
			gap: 0.4rem;
			padding: 0.4rem 0.7rem;
		}

		.note-action:hover {
			background: #eef2ff;
			color: var(--accent);
		}

		.note-action--danger:hover {
			background: #fee2e2;
			color: #b91c1c;
		}

		.note-kicker {
			color: var(--muted);
			display: flex;
			flex-wrap: wrap;
			font-size: 0.86rem;
			gap: 0.5rem;
			margin-bottom: 0.75rem;
		}

		.note-title {
			font-size: clamp(2rem, 6vw, 3.25rem);
			line-height: 1.02;
			margin: 0 0 1rem;
		}

		.note-link {
			display: inline-flex;
			gap: 0.4rem;
			margin-bottom: 1rem;
			max-width: 100%;
			overflow-wrap: anywhere;
		}

		.note-tags {
			display: flex;
			flex-wrap: wrap;
			gap: 0.4rem;
			margin-bottom: 1.25rem;
		}

		.note-tag {
			background: #eef2ff;
			border: 1px solid #c7d2fe;
			border-radius: 999px;
			color: #3730a3;
			font-size: 0.78rem;
			font-weight: 700;
			padding: 0.22rem 0.55rem;
		}

		.note-markdown {
			font-size: 1.02rem;
			line-height: 1.68;
		}

		.note-markdown h1,
		.note-markdown h2,
		.note-markdown h3 {
			margin-top: 1.5rem;
		}

		.note-markdown pre {
			background: #0f172a;
			border-radius: 8px;
			color: #e2e8f0;
			overflow-x: auto;
			padding: 1rem;
		}

		.note-markdown code {
			background: #e2e8f0;
			border-radius: 5px;
			padding: 0.1rem 0.25rem;
		}

		.note-markdown pre code {
			background: transparent;
			padding: 0;
		}

		.note-empty {
			border: 1px dashed var(--border);
			border-radius: 12px;
			color: var(--muted);
			padding: 1.5rem;
		}

		.note-edit-form {
			display: grid;
			gap: 0.9rem;
		}

		.note-edit-form textarea {
			min-height: 320px;
			resize: vertical;
		}

		.note-form-status {
			color: var(--muted);
			font-size: 0.88rem;
		}

		.is-hidden {
			display: none !important;
		}
	</style>
	<script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js"></script>
	<script type="module" src="/scripts/note.js"></script>
</head>
<body>
	<main class="note-page">
		<nav class="note-nav">
			<a href="/"><i class="bi bi-compass"></i> {{ .sitename }}</a>
			<div class="d-flex align-items-center gap-2">
				<button id="editNote" class="note-action is-hidden" type="button">
					<i class="bi bi-pencil-square"></i>
					<span>edit</span>
				</button>
				<button id="deleteNote" class="note-action note-action--danger is-hidden" type="button">
					<i class="bi bi-trash"></i>
					<span>delete</span>
				</button>
				<a id="rawLink" href="#" target="_blank" rel="noopener noreferrer" class="note-action is-hidden">
					<i class="bi bi-code-slash"></i>
					<span>raw</span>
				</a>
			</div>
		</nav>
		<article id="noteShell" class="note-shell" aria-live="polite">
			<div class="note-empty">Loading note...</div>
		</article>
	</main>
</body>
</html>
